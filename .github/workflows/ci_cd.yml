name: CI/CD Pipeline - FastAPI to EC2 via ECR

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: 620651905208.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: bosch-roxroth-app

    steps:

    # ---------------------------
    # 1. Checkout code
    # ---------------------------
    - name: Checkout repository
      uses: actions/checkout@v3

    # ---------------------------
    # 2. Inject MLflow / DagsHub credentials
    # ---------------------------
    - name: Set MLflow credentials
      run: |
        echo "HYDRAULIC_DAGSHUB_TOKEN=${{ secrets.HYDRAULIC_DAGSHUB_TOKEN }}" >> $GITHUB_ENV
        echo "MLFLOW_TRACKING_USERNAME=${{ secrets.HYDRAULIC_DAGSHUB_TOKEN }}" >> $GITHUB_ENV
        echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.HYDRAULIC_DAGSHUB_TOKEN }}" >> $GITHUB_ENV

    # ---------------------------
    # 3. Configure AWS credentials
    # ---------------------------
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ---------------------------
    # 4. Login to Amazon ECR
    # ---------------------------
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin $ECR_REGISTRY

    # ---------------------------
    # 5. Build Docker image
    # ---------------------------
    - name: Build Docker image
      run: |
        docker build -t $ECR_REPOSITORY .

    # ---------------------------
    # 6. Tag image
    # ---------------------------
    - name: Tag Docker image
      run: |
        docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # ---------------------------
    # 7. Push image to ECR
    # ---------------------------
    - name: Push image to ECR
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # ---------------------------
    # 8. Deploy to EC2 via SSH
    # ---------------------------
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: ECR_REGISTRY,ECR_REPOSITORY,HYDRAULIC_DAGSHUB_TOKEN,MLFLOW_TRACKING_USERNAME,MLFLOW_TRACKING_PASSWORD
        script: |
            # Stop old container
            docker stop fastapi-app || true
            docker rm fastapi-app || true

            # Login to ECR on EC2
            aws ecr get-login-password --region us-east-1 \
                | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Pull latest image
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

            # Run new container
            docker run -d \
                -p 8000:8000 \
                --name fastapi-app \
                -e HYDRAULIC_DAGSHUB_TOKEN=$HYDRAULIC_DAGSHUB_TOKEN \
                -e MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME \
                -e MLFLOW_TRACKING_PASSWORD=$MLFLOW_TRACKING_PASSWORD \
                $ECR_REGISTRY/$ECR_REPOSITORY:latest